<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 - 宿舍點名系統</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">

    <div class="login-card">
      <div class="login-logo">🏠</div>
      <h1 class="login-title">宿舍點名系統</h1>
      <p class="login-subtitle">德明宿舍管理平台</p>

      <form id="login-form">
        <div class="login-field">
          <label for="username">帳號</label>
          <input
            type="text"
            id="username"
            autocomplete="username"
            placeholder="請輸入帳號"
            required
          />
        </div>
        <div class="login-field">
          <label for="password">密碼</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="請輸入密碼"
            required
          />
        </div>
        <button type="submit" class="login-btn" id="login-btn">登入</button>
      </form>

      <p id="error-message" class="login-error"></p>
      <p id="loading-message" class="login-loading">登入中，請稍候...</p>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("/api/check-login")
          .then((response) => response.json())
          .then((data) => {
            if (data.loggedIn) window.location.href = "index.html";
          });

        const loginForm = document.getElementById("login-form");
        const loginBtn = document.getElementById("login-btn");
        const errorMessage = document.getElementById("error-message");
        const loadingMessage = document.getElementById("loading-message");

        loginForm.addEventListener("submit", function (event) {
          event.preventDefault();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!username || !password) {
            errorMessage.textContent = "⚠️ 帳號與密碼不能為空！";
            errorMessage.style.display = "block";
            return;
          }

          loginBtn.disabled = true;
          loadingMessage.style.display = "block";
          errorMessage.style.display = "none";

          fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          })
            .then((response) => {
              if (!response.ok) throw new Error();
              return response.json();
            })
            .then((data) => {
              localStorage.setItem("user", JSON.stringify(data.user));
              window.location.href = "index.html";
            })
            .catch(() => {
              errorMessage.textContent = "❌ 帳號或密碼錯誤，請重試！";
              errorMessage.style.display = "block";
            })
            .finally(() => {
              loginBtn.disabled = false;
              loadingMessage.style.display = "none";
            });
        });
      });
    </script>
  </body>
</html>
