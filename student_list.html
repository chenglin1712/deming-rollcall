<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>學生清單</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>學生清單</h1>
      </header>

      <main>
        <section class="card">
          <h2>篩選條件</h2>

          <div
            class="filter-section"
            style="
              margin-bottom: 15px;
              border-bottom: 1px dashed #eee;
              padding-bottom: 15px;
            "
          >
            <label for="studentSearch">學號搜尋：</label>
            <div style="flex: 1; position: relative">
              <input
                type="text"
                id="studentSearch"
                placeholder="輸入學號後按下 Enter 搜尋..."
                style="
                  width: 100%;
                  padding: 10px;
                  border: 1px solid #ddd;
                  border-radius: 4px;
                "
              />
            </div>
          </div>

          <div class="filter-section">
            <label for="groupSelect">選擇群組：</label>
            <select id="groupSelect">
              <option value="">請選擇</option>
            </select>
          </div>
        </section>

        <section class="card">
          <h2>學生名單</h2>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>學號</th>
                  <th>姓名</th>
                  <th>房號</th>
                  <th>電話</th>
                </tr>
              </thead>
              <tbody id="studentTableBody">
                <tr>
                  <td colspan="4">請使用搜尋或選擇群組以顯示學生</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="action-buttons">
          <button class="btn secondary" onclick="location.href='index.html'">
            返回首頁
          </button>
        </section>
      </main>

      <footer>
        <p>© 2025 宿舍點名系統</p>
      </footer>
    </div>

    <script src="student_list.js"></script>
  </body>
</html>
