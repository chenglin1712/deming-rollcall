<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>修改密碼 - 宿舍點名系統</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>修改密碼</h1>
      </header>

      <main>
        <section class="card" style="max-width: 420px; margin: 0 auto;">
          <form id="change-password-form">
            <div class="form-group" style="margin-bottom: 16px;">
              <label for="old-password">舊密碼</label>
              <input type="password" id="old-password" class="form-control"
                style="width:100%; padding:10px; margin-top:6px; border:1px solid #ddd; border-radius:6px; font-size:1rem;"
                placeholder="請輸入目前密碼" required />
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
              <label for="new-password">新密碼</label>
              <input type="password" id="new-password" class="form-control"
                style="width:100%; padding:10px; margin-top:6px; border:1px solid #ddd; border-radius:6px; font-size:1rem;"
                placeholder="至少 6 個字元" required />
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
              <label for="confirm-password">確認新密碼</label>
              <input type="password" id="confirm-password" class="form-control"
                style="width:100%; padding:10px; margin-top:6px; border:1px solid #ddd; border-radius:6px; font-size:1rem;"
                placeholder="再次輸入新密碼" required />
            </div>

            <div id="msg" style="display:none; padding:10px; border-radius:6px; margin-bottom:14px; font-weight:bold;"></div>

            <div class="action-buttons">
              <button type="submit" class="btn primary" id="save-btn">儲存變更</button>
              <button type="button" class="btn secondary" onclick="location.href='index.html'">返回首頁</button>
            </div>
          </form>
        </section>
      </main>

      <footer>
        <p>© 2025 德明宿舍管理系統</p>
      </footer>
    </div>

    <script src="change_password.js"></script>
  </body>
</html>
