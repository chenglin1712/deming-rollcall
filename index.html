<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宿舍點名系統</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header id="main-header">
        <div>
          <h1>宿舍點名系統</h1>
          <p id="welcome-message">載入中...</p>
        </div>
        <button id="logout-btn-header" class="btn secondary">登出</button>
      </header>

      <main>
        <div id="admin-dashboard" class="hidden">
          <div class="admin-header-widget">
            <h2 id="admin-welcome">Good Morning.</h2>
            <p id="system-time">--月--日</p>
          </div>

          <div class="search-wrapper">
            <span class="search-icon-placeholder">🔍</span>
            <input
              type="text"
              id="student-search-input"
              class="search-input"
              placeholder="輸入學號搜尋學生..."
              autocomplete="off"
            />
          </div>

          <div class="grid-menu">
            <div
              class="menu-item action-primary"
              onclick="toggleView('leader')"
            >
              <div class="icon-box">📝</div>
              <span>開始點名</span>
              <p class="desc">進入樓層列表</p>
            </div>
            <div
              class="menu-item history"
              onclick="location.href='history.html'"
            >
              <div class="icon-box">📅</div>
              <span>歷史紀錄</span>
            </div>
            <div
              class="menu-item students"
              onclick="location.href='student_list.html'"
            >
              <div class="icon-box">👥</div>
              <span>學生名單</span>
            </div>
            <div
              class="menu-item import"
              onclick="location.href='add_student.html'"
            >
              <div class="icon-box">📥</div>
              <span>匯入資料</span>
            </div>
            <div class="menu-item danger" onclick="confirmClear()">
              <div class="icon-box">🗑️</div>
              <span>清空紀錄</span>
            </div>
            <div
              class="menu-item logout"
              onclick="document.getElementById('logout-btn-header').click()"
            >
              <div class="icon-box">🔒</div>
              <span>登出系統</span>
            </div>
          </div>
        </div>

        <div id="dorm-leader-view">
          <div style="margin-bottom: 15px">
            <button
              id="back-to-dashboard-btn"
              class="btn text-only hidden"
              onclick="toggleView('admin')"
            >
              ← 返回管理儀表板
            </button>
          </div>

          <section class="card-simple">
            <h2>選擇點名群組</h2>
            <div class="group-selection" id="group-container">
              <p>正在載入群組...</p>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>© 2025 德明宿舍管理系統</p>
      </footer>

      <div class="modal-overlay" id="search-modal" onclick="closeModal(event)">
        <div class="modal-card">
          <div class="student-avatar">👤</div>
          <h3 id="modal-name">載入中...</h3>
          <p id="modal-id">--</p>

          <div class="info-grid">
            <div class="info-item">
              <label>房號/床位</label>
              <span id="modal-room">--</span>
            </div>
            <div class="info-item">
              <label>群組</label>
              <span id="modal-group">--</span>
            </div>
            <div class="info-item" style="grid-column: 1 / -1">
              <label>今日狀態</label>
              <div id="modal-status-container" style="margin-top: 5px">
                <span class="status-badge">未點名</span>
              </div>
            </div>
            <div class="info-item" style="grid-column: 1 / -1">
              <label>聯絡電話</label>
              <span id="modal-phone">--</span>
            </div>
          </div>

          <button
            class="btn secondary"
            style="width: 100%"
            onclick="closeModal(null, true)"
          >
            關閉
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // ... (原有的登入檢查邏輯保持不變) ...
        fetch("/api/check-login")
          .then((response) => response.json())
          .then((data) => {
            if (!data.loggedIn) {
              window.location.href = "login.html";
              return;
            }
            const user = data.user;
            const displayName = user.display_name.split("（")[0];
            document.getElementById(
              "welcome-message"
            ).textContent = `Hi, ${displayName}`;

            if (user.username === "deming") {
              toggleView("leader", false);
            } else {
              // 管理員模式
              const now = new Date();
              const hour = now.getHours();
              let greeting = "早安";
              if (hour >= 11) greeting = "午安";
              if (hour >= 18) greeting = "晚安";
              document.getElementById(
                "admin-welcome"
              ).textContent = `${greeting}，${displayName}。`;
              updateTime();
              toggleView("admin");
            }
            loadGroups();
          });

        // 登出
        document
          .getElementById("logout-btn-header")
          .addEventListener("click", function () {
            fetch("/api/logout", { method: "POST" })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  sessionStorage.clear();
                  window.location.href = "login.html";
                }
              });
          });

        // **🔍 新增：搜尋框按 Enter 觸發搜尋**
        const searchInput = document.getElementById("student-search-input");
        searchInput.addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            const id = this.value.trim();
            if (id) searchStudent(id);
          }
        });
      });

      // ... (原有的 toggleView, updateTime, loadGroups, confirmClear 保持不變) ...
      window.toggleView = function (mode, isAdminUser = true) {
        const adminDashboard = document.getElementById("admin-dashboard");
        const leaderView = document.getElementById("dorm-leader-view");
        const mainHeader = document.getElementById("main-header");
        const backBtn = document.getElementById("back-to-dashboard-btn");

        if (mode === "admin") {
          document.body.classList.add("admin-mode");
          adminDashboard.classList.remove("hidden");
          leaderView.classList.add("hidden");
          mainHeader.classList.add("hidden");
        } else {
          document.body.classList.remove("admin-mode");
          adminDashboard.classList.add("hidden");
          leaderView.classList.remove("hidden");
          mainHeader.classList.remove("hidden");
          if (isAdminUser) backBtn.classList.remove("hidden");
        }
      };

      function updateTime() {
        const now = new Date();
        const dateString = now.toLocaleDateString("zh-TW", {
          month: "long",
          day: "numeric",
          weekday: "long",
        });
        const timeEl = document.getElementById("system-time");
        if (timeEl) timeEl.textContent = dateString;
      }

      function loadGroups() {
        fetch("/api/groups")
          .then((response) => response.json())
          .then((groups) => {
            const groupContainer = document.getElementById("group-container");
            groupContainer.innerHTML = "";
            groups.forEach((group) => {
              let groupCard = document.createElement("div");
              groupCard.className = "group-card-simple";
              groupCard.onclick = () =>
                (location.href = `attendance.html?group=${encodeURIComponent(
                  group
                )}`);
              groupCard.innerHTML = `<h3>${group}</h3><p>點擊進入</p>`;
              groupContainer.appendChild(groupCard);
            });
          });
      }

      window.confirmClear = function () {
        if (confirm("⚠️ 危險操作：確定要清空紀錄嗎？")) {
          fetch("/api/attendance/clear", { method: "DELETE" }).then(() =>
            alert("已清空")
          );
        }
      };

      // ==========================================
      // 🔍 新增：搜尋相關功能函式
      // ==========================================
      function searchStudent(id) {
        // 清空輸入框並失去焦點 (收起手機鍵盤)
        document.getElementById("student-search-input").blur();

        fetch(`/api/student/search?id=${encodeURIComponent(id)}`)
          .then((res) => res.json())
          .then((data) => {
            if (!data.success) {
              alert(data.message || "找不到該學生");
              return;
            }
            showModal(data.data);
          })
          .catch((err) => {
            console.error(err);
            alert("搜尋發生錯誤");
          });
      }

      function showModal(student) {
        document.getElementById("modal-name").textContent = student.name;
        document.getElementById("modal-id").textContent = student.id;
        document.getElementById("modal-room").textContent = student.roomNumber;
        document.getElementById("modal-group").textContent = student.group_name;
        document.getElementById("modal-phone").textContent =
          student.phoneNumber || "無資料";

        // 處理今日狀態
        const statusContainer = document.getElementById(
          "modal-status-container"
        );
        let statusHtml = '<span class="status-badge">今日未點名</span>';

        if (student.today_status) {
          let statusClass = "";
          if (student.today_status === "在寢") statusClass = "present";
          else if (
            student.today_status === "未歸" ||
            student.today_status === "缺席"
          )
            statusClass = "absent";
          else statusClass = "late";

          statusHtml = `<span class="status-badge ${statusClass}">${student.today_status}</span>`;
        }
        statusContainer.innerHTML = statusHtml;

        // 顯示彈窗
        const modal = document.getElementById("search-modal");
        modal.classList.add("active");
      }

      function closeModal(event, force = false) {
        if (force || event.target.id === "search-modal") {
          document.getElementById("search-modal").classList.remove("active");
          document.getElementById("student-search-input").value = ""; // 搜尋完清空
        }
      }
    </script>
  </body>
</html>
