<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宿舍點名系統</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header id="main-header">
        <div>
          <h1>宿舍點名系統</h1>
          <p id="welcome-message">載入中...</p>
        </div>
        <button id="logout-btn-header" class="btn secondary">登出</button>
      </header>

      <main>
        <div id="admin-dashboard" class="hidden">
          <div class="admin-header-widget">
            <h2 id="admin-welcome">Good Morning.</h2>
            <p id="system-time">--月--日</p>
          </div>

          <div class="search-wrapper">
            <span class="search-icon-placeholder">🔍</span>
            <input
              type="text"
              id="student-search-input"
              class="search-input"
              placeholder="輸入學號搜尋學生..."
              autocomplete="off"
            />
          </div>

          <div class="grid-menu">
            <div
              class="menu-item action-primary"
              onclick="startAdminAttendance()"
            >
              <div class="icon-box">📝</div>
              <span>開始點名</span>
              <p class="desc">進入樓層列表</p>
            </div>
            <div
              class="menu-item history"
              onclick="location.href='history.html'"
            >
              <div class="icon-box">📅</div>
              <span>歷史紀錄</span>
            </div>
            <div
              class="menu-item students"
              onclick="location.href='student_list.html'"
            >
              <div class="icon-box">👥</div>
              <span>學生名單</span>
            </div>
            <div
              class="menu-item import"
              onclick="location.href='add_student.html'"
            >
              <div class="icon-box">📥</div>
              <span>匯入資料</span>
            </div>
            <div class="menu-item danger" onclick="confirmClear()">
              <div class="icon-box">🗑️</div>
              <span>清空紀錄</span>
            </div>
            <div
              class="menu-item"
              onclick="location.href='change_password.html'"
            >
              <div class="icon-box">🔑</div>
              <span>修改密碼</span>
            </div>
            <div
              class="menu-item logout"
              onclick="document.getElementById('logout-btn-header').click()"
            >
              <div class="icon-box">🔒</div>
              <span>登出系統</span>
            </div>
          </div>
        </div>

        <div id="dorm-leader-view">
          <div style="margin-bottom: 15px">
            <button
              id="back-to-dashboard-btn"
              class="btn text-only hidden"
              onclick="toggleView('admin')"
            >
              ← 返回管理儀表板
            </button>
          </div>

          <!-- 樓長模式選擇（deming 登入後才顯示） -->
          <section id="leader-mode-section" class="card-simple hidden">
            <h2>請選擇操作</h2>
            <div class="group-selection" style="margin-top: 12px;">
              <div class="group-card-simple" onclick="startTodayAttendance()">
                <h3>📝 今日點名</h3>
                <p>進行今天的點名</p>
              </div>
              <div class="group-card-simple" onclick="showMakeupSection()">
                <h3>📅 補點名</h3>
                <p>補登過去某日點名</p>
              </div>
            </div>
          </section>

          <!-- 補點名日期選擇 -->
          <section id="makeup-date-section" class="card-simple hidden">
            <h2>選擇補點日期</h2>
            <div style="margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
              <input type="date" id="makeup-date-input"
                style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;" />
              <button class="btn primary" onclick="confirmMakeupDate()">確認日期</button>
              <button class="btn secondary" onclick="showLeaderModeSelect()">← 返回</button>
            </div>
          </section>

          <!-- 群組選擇（今日點名 & 補點名共用） -->
          <section id="group-section" class="card-simple hidden">
            <h2 id="group-section-title">選擇點名群組</h2>
            <p id="group-section-subtitle" style="color: #888; font-size: 0.9rem; margin: 4px 0 12px;"></p>
            <div class="group-selection" id="group-container"></div>
            <div style="margin-top: 14px;">
              <button class="btn secondary" id="group-back-btn">← 返回</button>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>© 2025 德明宿舍管理系統</p>
      </footer>

      <div class="modal-overlay" id="search-modal" onclick="closeModal(event)">
        <div class="modal-card">
          <div class="student-avatar">👤</div>
          <h3 id="modal-name">載入中...</h3>
          <p id="modal-id">--</p>

          <div class="info-grid">
            <div class="info-item">
              <label>房號/床位</label>
              <span id="modal-room">--</span>
            </div>
            <div class="info-item">
              <label>群組</label>
              <span id="modal-group">--</span>
            </div>
            <div class="info-item" style="grid-column: 1 / -1">
              <label>今日狀態</label>
              <div id="modal-status-container" style="margin-top: 5px">
                <span class="status-badge">未點名</span>
              </div>
            </div>
            <div class="info-item" style="grid-column: 1 / -1">
              <label>聯絡電話</label>
              <span id="modal-phone">--</span>
            </div>
          </div>

          <div id="modal-history" style="margin-top:12px; text-align:left;">
            <label style="font-size:0.85rem; color:#888;">最近點名紀錄</label>
            <div id="modal-history-list" style="margin-top:6px; max-height:140px; overflow-y:auto; font-size:0.85rem;"></div>
          </div>

          <button
            class="btn secondary"
            style="width: 100%; margin-top:12px;"
            onclick="closeModal(null, true)"
          >
            關閉
          </button>
        </div>
      </div>
    </div>

    <script>
      let selectedDate = null; // null = 今日；字串 = 補點名日期
      let isDeming = false;

      document.addEventListener("DOMContentLoaded", function () {
        fetch("/api/check-login")
          .then((response) => response.json())
          .then((data) => {
            if (!data.loggedIn) {
              window.location.href = "login.html";
              return;
            }
            const user = data.user;
            const displayName = user.display_name.split("（")[0];
            document.getElementById("welcome-message").textContent = `Hi, ${displayName}`;

            if (user.username === "deming") {
              isDeming = true;
              toggleView("leader", false);
              showLeaderModeSelect();
            } else {
              const now = new Date();
              const hour = now.getHours();
              let greeting = "早安";
              if (hour >= 11) greeting = "午安";
              if (hour >= 18) greeting = "晚安";
              document.getElementById("admin-welcome").textContent = `${greeting}，${displayName}。`;
              updateTime();
              toggleView("admin");
            }
          });

        document.getElementById("logout-btn-header").addEventListener("click", function () {
          fetch("/api/logout", { method: "POST" })
            .then((res) => res.json())
            .then((data) => {
              if (data.success) {
                sessionStorage.clear();
                window.location.href = "login.html";
              }
            });
        });

        const searchInput = document.getElementById("student-search-input");
        searchInput.addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            const id = this.value.trim();
            if (id) searchStudent(id);
          }
        });

        // 補點名日期：限制最多到今天
        const today = new Date().toLocaleDateString("sv-SE");
        document.getElementById("makeup-date-input").max = today;
      });

      // ── 畫面切換 ──────────────────────────────────
      window.toggleView = function (mode, isAdminUser = true) {
        const adminDashboard = document.getElementById("admin-dashboard");
        const leaderView = document.getElementById("dorm-leader-view");
        const mainHeader = document.getElementById("main-header");
        const backBtn = document.getElementById("back-to-dashboard-btn");

        if (mode === "admin") {
          document.body.classList.add("admin-mode");
          adminDashboard.classList.remove("hidden");
          leaderView.classList.add("hidden");
          mainHeader.classList.add("hidden");
        } else {
          document.body.classList.remove("admin-mode");
          adminDashboard.classList.add("hidden");
          leaderView.classList.remove("hidden");
          mainHeader.classList.remove("hidden");
          if (isAdminUser) backBtn.classList.remove("hidden");
        }
      };

      function hideAllLeaderSections() {
        document.getElementById("leader-mode-section").classList.add("hidden");
        document.getElementById("makeup-date-section").classList.add("hidden");
        document.getElementById("group-section").classList.add("hidden");
      }

      // 樓長：顯示模式選擇
      function showLeaderModeSelect() {
        hideAllLeaderSections();
        document.getElementById("leader-mode-section").classList.remove("hidden");
      }

      // 樓長：顯示補點名日期選擇
      window.showMakeupSection = function () {
        hideAllLeaderSections();
        document.getElementById("makeup-date-section").classList.remove("hidden");
      };

      // 樓長：今日點名
      window.startTodayAttendance = function () {
        selectedDate = null;
        showGroupSection("今日點名 — 選擇群組", "", () => showLeaderModeSelect());
      };

      // 樓長：確認補點名日期
      window.confirmMakeupDate = function () {
        const input = document.getElementById("makeup-date-input");
        const date = input.value;
        if (!date) { alert("請選擇日期"); return; }
        selectedDate = date;
        const [y, m, d] = date.split("-");
        const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
        const weekday = weekdays[new Date(date + "T00:00:00").getDay()];
        const label = `${y}/${m}/${d}（週${weekday}）`;
        showGroupSection("補點名 — 選擇群組", label, () => showMakeupSection());
      };

      // 管理員：開始點名
      window.startAdminAttendance = function () {
        selectedDate = null;
        toggleView("leader");
        showGroupSection("選擇點名群組", "", () => toggleView("admin"));
      };

      // 顯示群組選擇區塊
      function showGroupSection(title, subtitle, backAction) {
        hideAllLeaderSections();
        document.getElementById("group-section-title").textContent = title;
        document.getElementById("group-section-subtitle").textContent = subtitle;
        document.getElementById("group-back-btn").onclick = backAction;
        document.getElementById("group-section").classList.remove("hidden");
        loadGroups();
      }

      // ── 載入群組 ──────────────────────────────────
      function loadGroups() {
        fetch("/api/groups")
          .then((response) => response.json())
          .then((groups) => {
            const groupContainer = document.getElementById("group-container");
            groupContainer.innerHTML = "";

            if (groups.length === 0) {
              groupContainer.innerHTML = "<p>尚無群組資料</p>";
              return;
            }

            groups.forEach((group) => {
              const card = document.createElement("div");
              card.className = "group-card-simple";

              if (selectedDate) {
                // 補點名模式：先檢查是否已有紀錄
                card.innerHTML = `<h3>${group}</h3><p>檢查中...</p>`;
                fetch(`/api/attendance/check?date=${encodeURIComponent(selectedDate)}&group=${encodeURIComponent(group)}`)
                  .then((r) => r.json())
                  .then((result) => {
                    if (result.exists) {
                      card.innerHTML = `<h3>${group}</h3><p style="color:#27ae60; font-weight:bold;">✅ 已完成點名</p>`;
                      card.style.opacity = "0.6";
                      card.style.cursor = "default";
                      card.onclick = () => alert(`「${group}」在 ${selectedDate} 已完成點名（共 ${result.count} 筆紀錄）`);
                    } else {
                      card.innerHTML = `<h3>${group}</h3><p style="color:#e67e22;">⚠️ 尚未點名，點擊補點</p>`;
                      card.onclick = () => {
                        location.href = `attendance.html?group=${encodeURIComponent(group)}&date=${encodeURIComponent(selectedDate)}`;
                      };
                    }
                  })
                  .catch(() => {
                    card.innerHTML = `<h3>${group}</h3><p>無法確認狀態</p>`;
                  });
              } else {
                // 今日點名模式：直接進入
                card.innerHTML = `<h3>${group}</h3><p>點擊進入</p>`;
                card.onclick = () => {
                  location.href = `attendance.html?group=${encodeURIComponent(group)}`;
                };
              }

              groupContainer.appendChild(card);
            });
          });
      }

      // ── 其他功能 ──────────────────────────────────
      function updateTime() {
        const now = new Date();
        const dateString = now.toLocaleDateString("zh-TW", {
          month: "long", day: "numeric", weekday: "long",
        });
        const timeEl = document.getElementById("system-time");
        if (timeEl) timeEl.textContent = dateString;
      }

      window.confirmClear = function () {
        if (confirm("⚠️ 危險操作：確定要清空紀錄嗎？")) {
          fetch("/api/attendance/clear", { method: "DELETE" }).then(() =>
            alert("已清空")
          );
        }
      };

      // ==========================================
      // 🔍 新增：搜尋相關功能函式
      // ==========================================
      function searchStudent(id) {
        // 清空輸入框並失去焦點 (收起手機鍵盤)
        document.getElementById("student-search-input").blur();

        fetch(`/api/student/search?id=${encodeURIComponent(id)}`)
          .then((res) => res.json())
          .then((data) => {
            if (!data.success) {
              alert(data.message || "找不到該學生");
              return;
            }
            showModal(data.data);
          })
          .catch((err) => {
            console.error(err);
            alert("搜尋發生錯誤");
          });
      }

      function showModal(student) {
        document.getElementById("modal-name").textContent = student.name;
        document.getElementById("modal-id").textContent = student.id;
        document.getElementById("modal-room").textContent = student.roomNumber;
        document.getElementById("modal-group").textContent = student.group_name;
        document.getElementById("modal-phone").textContent =
          student.phoneNumber || "無資料";

        // 處理今日狀態
        const statusContainer = document.getElementById(
          "modal-status-container"
        );
        let statusHtml = '<span class="status-badge">今日未點名</span>';

        if (student.today_status) {
          let statusClass = "";
          if (student.today_status === "在寢") statusClass = "present";
          else if (
            student.today_status === "未歸" ||
            student.today_status === "缺席"
          )
            statusClass = "absent";
          else statusClass = "late";

          statusHtml = `<span class="status-badge ${statusClass}">${student.today_status}</span>`;
        }
        statusContainer.innerHTML = statusHtml;

        // 載入個人歷史紀錄
        const historyList = document.getElementById("modal-history-list");
        historyList.textContent = "載入中...";
        fetch(`/api/student/history?id=${encodeURIComponent(student.id)}`)
          .then((r) => r.json())
          .then((h) => {
            if (!h.success || h.data.length === 0) {
              historyList.textContent = "尚無點名紀錄";
              return;
            }
            historyList.innerHTML = h.data.map((r) => {
              const color = r.status === "未歸" ? "#e74c3c" : r.status === "晚歸" ? "#e67e22" : "#27ae60";
              return `<div style="display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #f0f0f0;">
                <span>${r.date}</span>
                <span style="color:${color}; font-weight:bold;">${r.status}</span>
              </div>`;
            }).join("");
          })
          .catch(() => { historyList.textContent = "載入失敗"; });

        // 顯示彈窗
        const modal = document.getElementById("search-modal");
        modal.classList.add("active");
      }

      function closeModal(event, force = false) {
        if (force || event.target.id === "search-modal") {
          document.getElementById("search-modal").classList.remove("active");
          document.getElementById("student-search-input").value = ""; // 搜尋完清空
        }
      }
    </script>
  </body>
</html>
